name: Build Gg_Docking_Kernel (NDK)

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      DRIVER:
        description: '🎯 请选择要编译的驱动方案'
        required: true
        type: choice
        default: 'ditProKpm'
        options:
          - KPM-KMA-RW-DRIVER
          - KpmApReadioctl
          - KpmMemoryioctlhook
          - KpmTearioctlhook
          - ditProKpm
          - driverDitNetlink
          - driverGT1_567RTdev
          - driverGT2_12RThook
          - driverParadise
          - driverQX114

env:
  SELECTED_DRIVER: ${{ github.event.inputs.DRIVER || 'ditProKpm' }}

jobs:
  build-so:
    name: Compile libKernelGg.so
    runs-on: ubuntu-latest

    steps:
      - name: 检出源码 (Checkout Code)
        uses: actions/checkout@v4

      - name: 🚀 自动配置 NDK 环境 (Setup NDK)
        run: |
          echo "NDK_PATH=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "$ANDROID_NDK_LATEST_HOME" >> $GITHUB_PATH

      - name: 🔨 执行编译 (Build Project)
        run: |
          FULL_PATH="KernelGg/${{ env.SELECTED_DRIVER }}"
          echo "👉 正在进入目录: $FULL_PATH"
          cd "$FULL_PATH" || { echo "❌ 找不到目录 $FULL_PATH"; exit 1; }

          # 绕过本地脚本，直接调用底层编译
          if [ -f "jni/Android.mk" ] || [ -f "Android.mk" ]; then
            echo "✅ 发现 Android.mk！开始编译..."
            ndk-build -j$(nproc --all) || { echo "❌ C/C++ 源码编译失败！"; exit 1; }
          elif [ -f "build.sh" ]; then
            echo "⚠️ 尝试执行 build.sh..."
            chmod +x build.sh
            sed -i 's|/[^ ]*/ndk-build|ndk-build|g' build.sh
            ./build.sh || { echo "❌ C/C++ 源码编译失败！"; exit 1; }
          else
            echo "❌ 无法编译！"
            exit 1
          fi

      - name: ☁️ 精准提取并上传产物 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: libKernelGg-${{ env.SELECTED_DRIVER }}
          # 💡 终极修复：直接锁定刚才编译的那个文件夹里的产物，拒绝全局搜索，绝不串台！
          path: KernelGg/${{ env.SELECTED_DRIVER }}/libs/arm64-v8a/libKernelGg.so
          compression-level: 9
          if-no-files-found: error
