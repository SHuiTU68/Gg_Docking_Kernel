name: Build Gg_Docking_Kernel (NDK)

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      DRIVER:
        description: '🎯 请选择要编译的驱动方案'
        required: true
        type: choice
        default: 'ditProKpm'
        options:
          - KPM-KMA-RW-DRIVER
          - KpmApReadioctl
          - KpmMemoryioctlhook
          - KpmTearioctlhook
          - ditProKpm
          - driverDitNetlink
          - driverGT1_567RTdev
          - driverGT2_12RThook
          - driverParadise
          - driverQX114

jobs:
  build-so:
    name: Compile libKernelGg.so
    runs-on: ubuntu-latest

    steps:
      - name: 检出源码 (Checkout Code)
        uses: actions/checkout@v4

      - name: 配置 Android NDK 环境 (Setup NDK)
        run: |
          echo "NDK_PATH=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "$ANDROID_NDK_LATEST_HOME" >> $GITHUB_PATH

      - name: 执行编译 (Build Project)
        run: |
          if [ -d "KernelGg" ]; then
            echo "👉 进入 KernelGg 目录"
            cd KernelGg
          else
            echo "❌ 找不到 KernelGg 目录，请检查仓库结构！"
            exit 1
          fi
          
          # 💡 修复核心：处理 push 自动触发时，变量为空的情况
          TARGET_DIR="${{ github.event.inputs.DRIVER }}"
          if [ -z "$TARGET_DIR" ]; then
            TARGET_DIR="ditProKpm"
            echo "⚠️ 检测到自动触发或未选定驱动，使用默认值: $TARGET_DIR"
          fi

          echo "👉 进入目标驱动目录: $TARGET_DIR"
          cd "$TARGET_DIR" || { echo "❌ 找不到目录 $TARGET_DIR"; exit 1; }

          echo "当前工作目录: $(pwd)"

          # 智能适配编译逻辑
          if [ -f "build.sh" ]; then
            echo "✅ 发现 build.sh，正在修复路径并执行..."
            chmod +x build.sh
            sed -i 's|/.*/ndk-build|ndk-build|g' build.sh
            ./build.sh
          elif [ -f "jni/Android.mk" ] || [ -f "Android.mk" ]; then
            echo "✅ 发现 Android.mk，直接执行 ndk-build..."
            ndk-build -j$(nproc --all)
          else
            echo "❌ 未找到 build.sh 或 Android.mk，编译失败！"
            # 打印当前目录文件以便排错
            ls -la
            exit 1
          fi

      - name: 提取并上传产物 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          # 💡 同样修复上传时的命名为空的问题
          name: libKernelGg-${{ github.event.inputs.DRIVER || 'ditProKpm' }}
          path: '**/libs/arm64-v8a/libKernelGg.so'
          if-no-files-found: error
          compression-level: 9
