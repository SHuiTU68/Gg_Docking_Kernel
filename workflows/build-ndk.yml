name: Build Gg_Docking_Kernel (NDK)

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      DRIVER:
        description: '🎯 请选择要编译的驱动方案'
        required: true
        type: choice
        default: 'ditProKpm'
        options:
          - KPM-KMA-RW-DRIVER
          - KpmApReadioctl
          - KpmMemoryioctlhook
          - KpmTearioctlhook
          - ditProKpm
          - driverDitNetlink
          - driverGT1_567RTdev
          - driverGT2_12RThook
          - driverParadise
          - driverQX114

jobs:
  build-so:
    name: Compile libKernelGg.so
    runs-on: ubuntu-latest

    steps:
      - name: 检出源码 (Checkout Code)
        uses: actions/checkout@v4

      - name: 配置 Android NDK 环境 (Setup NDK)
        run: |
          # 自动使用 Ubuntu 镜像自带的最新版 NDK
          echo "NDK_PATH=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          echo "$ANDROID_NDK_LATEST_HOME" >> $GITHUB_PATH

      - name: 执行编译 (Build Project)
        run: |
          # 根据截图，判断文件夹是否在 KernelGg 目录下并进入
          if [ -d "KernelGg" ]; then
            echo "👉 进入 KernelGg 目录"
            cd KernelGg
          fi
          
          TARGET_DIR="${{ github.event.inputs.DRIVER }}"
          echo "👉 进入目标驱动目录: $TARGET_DIR"
          cd "$TARGET_DIR" || { echo "❌ 找不到目录 $TARGET_DIR"; exit 1; }

          echo "当前工作目录: $(pwd)"

          # 智能适配编译逻辑
          if [ -f "build.sh" ]; then
            echo "✅ 发现 build.sh，正在修复硬编码的 NDK 路径..."
            chmod +x build.sh
            # 自动把 build.sh 里的固定路径替换为系统级 ndk-build
            sed -i 's|/.*/ndk-build|ndk-build|g' build.sh
            ./build.sh
          elif [ -f "jni/Android.mk" ] || [ -f "Android.mk" ]; then
            echo "✅ 发现 Android.mk，直接执行 ndk-build..."
            ndk-build -j$(nproc --all)
          else
            echo "❌ 未找到 build.sh 或 Android.mk，编译失败！"
            exit 1
          fi

      - name: 提取并上传产物 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          # 产物压缩包的名称会自动带上你选择的驱动名，例如 libKernelGg-ditProKpm
          name: libKernelGg-${{ github.event.inputs.DRIVER }}
          # 全局搜索编译出的 so 文件
          path: '**/libs/arm64-v8a/libKernelGg.so'
          if-no-files-found: error
          compression-level: 9
